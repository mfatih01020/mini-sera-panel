<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Sera Pro | Tam Senkron Panel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS aynı kalıyor, spinner ve loading sınıfları dahil */
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --green: #238636; --red: #da3633; --text: #c9d1d9; --border: #30363d; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
        .control-row { background: #0d1117; padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #21262d; }
        .btn-group { display: flex; gap: 8px; margin-top: 8px; }
        .btn { flex: 1; padding: 10px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid #fff; border-radius: 50%; animation: spin 1s linear infinite; display: none; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading .spinner { display: block; }
        .status-tag { font-size: 0.7rem; padding: 3px 8px; border-radius: 5px; }
        .tag-on { background: rgba(56, 139, 253, 0.15); color: var(--accent); border: 1px solid var(--accent); }
        .tag-off { background: rgba(248, 81, 73, 0.15); color: #f85149; border: 1px solid #f85149; }
        input[type="number"] { width: 60px; background: #0b0e14; border: 1px solid var(--border); color: white; border-radius: 5px; padding: 5px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="card-header">CAM KONTROLÜ <span id="st_cam" class="status-tag">...</span></div>
        <div class="btn-group">
            <button id="btn_cam_ac" class="btn btn-green" onclick="runAction('cam_istek', 0, 'btn_cam_ac')"><div class="spinner"></div>AÇ</button>
            <button id="btn_cam_kapat" class="btn btn-red" onclick="runAction('cam_istek', 1, 'btn_cam_kapat')"><div class="spinner"></div>KAPAT</button>
        </div>
    </div>

    <div class="card">
        <div class="card-header">DOZAJ SİSTEMİ</div>
        <div class="control-row">
            <label>A (ml):</label> <input type="number" id="val_a" value="10">
            <button id="btn_a" class="btn btn-blue" onclick="runDozaj('dozaj_a_ml', 'val_a', 'btn_a', 'dozaj_a')"><div class="spinner"></div>GÖNDER</button>
        </div>
        <div class="control-row">
            <label>B (ml):</label> <input type="number" id="val_b" value="10">
            <button id="btn_b" class="btn btn-blue" onclick="runDozaj('dozaj_b_ml', 'val_b', 'btn_b', 'dozaj_b')"><div class="spinner"></div>GÖNDER</button>
        </div>
    </div>

    <div class="card">
        <div class="card-header">POMPA <span id="st_pompa" class="status-tag">...</span></div>
        <div class="btn-group">
            <button id="btn_p_ac" class="btn btn-green" onclick="runAction('pompa_istek', 1, 'btn_p_ac')"><div class="spinner"></div>BAŞLAT</button>
            <button id="btn_p_kap" class="btn btn-red" onclick="runAction('pompa_istek', 0, 'btn_p_kap')"><div class="spinner"></div>DURDUR</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://mini-sera-otomasyonum-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Standart butonlar için (Cam, Pompa)
    function runAction(path, value, btnId) {
        document.getElementById(btnId).classList.add('loading');
        db.ref('kontroller/' + path).set(value);
    }

    // Dozaj butonları için
    function runDozaj(path, inputId, btnId, onayKey) {
        let ml = document.getElementById(inputId).value;
        document.getElementById(btnId).classList.add('loading');
        db.ref('onaylar/' + onayKey).set("WAIT"); // Onayı sıfırla
        db.ref('kontroller/' + path).set(parseInt(ml));
    }

    // FIREBASE DİNLEME VE LOADING KALDIRMA
    db.ref().on('value', s => {
        const data = s.val();
        if(!data) return;

        // 1. CAM KONTROLÜ (Gerçek veriye göre loading kaldır)
        const camDurum = data.durumlar.gercek_cam;
        document.getElementById('st_cam').innerText = camDurum == 0 ? "AÇIK" : "KAPALI";
        document.getElementById('st_cam').className = "status-tag " + (camDurum == 0 ? "tag-on" : "tag-off");
        // Arduino'dan gelen veri ile webdeki istek eşleşince loading'i bitir
        document.getElementById('btn_cam_ac').classList.remove('loading');
        document.getElementById('btn_cam_kapat').classList.remove('loading');

        // 2. POMPA KONTROLÜ
        const pompaDurum = data.durumlar.gercek_pompa;
        document.getElementById('st_pompa').innerText = pompaDurum == 1 ? "ON" : "OFF";
        document.getElementById('st_pompa').className = "status-tag " + (pompaDurum == 1 ? "tag-on" : "tag-off");
        document.getElementById('btn_p_ac').classList.remove('loading');
        document.getElementById('btn_p_kap').classList.remove('loading');

        // 3. DOZAJ ONAYLARI
        if(data.onaylar.dozaj_a === "OK") document.getElementById('btn_a').classList.remove('loading');
        if(data.onaylar.dozaj_b === "OK") document.getElementById('btn_b').classList.remove('loading');
    });
</script>
</body>
</html>
