<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Sera Pro v5</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --green: #238636; --red: #da3633; --text: #c9d1d9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 800px; display: grid; gap: 20px; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #30363d; }
        .sensor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat { background: #0d1117; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #21262d; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; margin-top: 10px; transition: 0.3s; }
        .btn-blue { background: var(--accent); }
        .btn-outline { background: transparent; border: 1px solid #30363d; color: var(--text); }
        .status-tag { float: right; padding: 2px 8px; border-radius: 5px; font-size: 12px; }
        .tag-on { background: rgba(63,185,80,0.2); color: #3fb950; }
        .tag-off { background: rgba(248,81,73,0.2); color: #f85149; }
        input { width: 60px; background: #0b0e14; border: 1px solid #30363d; color: white; padding: 8px; border-radius: 5px; }
        .flex { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--accent); text-align: center;">🌿 SERA KONTROL PANELİ</h2>

    <div class="card">
        <div class="sensor-grid">
            <div class="stat"><span>İç Isı</span><h3 id="v_is">--</h3></div>
            <div class="stat"><span>İç Nem</span><h3 id="v_in">--</h3></div>
            <div class="stat"><span>Yağmur</span><h3 id="v_yg">--</h3></div>
            <div class="stat"><span>Su Seviye</span><h3 id="v_su">--</h3></div>
        </div>
    </div>

    <div class="card">
        <div class="flex"><strong>Pencere Durumu</strong> <span id="st_cam" class="status-tag tag-off">KAPALI</span></div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-blue" onclick="setCmd('cam_istek', 0)">CAMI AÇ</button>
            <button class="btn btn-outline" onclick="setCmd('cam_istek', 1)">CAMI KAPAT</button>
        </div>
        
        <div class="flex" style="margin-top:20px;"><strong>Fan Sistemi</strong> <span id="st_fan" class="status-tag tag-off">OFF</span></div>
        <button class="btn btn-outline" onclick="toggle('fan_istek')">FAN AÇ/KAPAT</button>
    </div>

    <div class="card">
        <strong>🧪 Dozajlama Ünitesi</strong>
        <p id="dozaj_mesaj" style="font-size: 12px; color: var(--accent);">Onay Bekleniyor...</p>
        <div class="flex" style="margin-top:10px;">
            <span>Gübre A (ml):</span>
            <div><input type="number" id="ml_a" value="10"> <button class="btn-blue" onclick="dozaj('a')" style="padding:8px; border-radius:5px;">GÖNDER</button></div>
        </div>
    </div>
</div>

<script>
    const config = { databaseURL: "https://mini-sera-otomasyonum-default-rtdb.firebaseio.com" };
    firebase.initializeApp(config);
    const db = firebase.database();

    // Komut Gönder
    function setCmd(path, val) { db.ref('kontroller/' + path).set(val); }
    function toggle(path) {
        db.ref('kontroller/' + path).once('value', s => db.ref('kontroller/' + path).set(s.val() == 1 ? 0 : 1));
    }
    function dozaj(tur) {
        const ml = document.getElementById('ml_' + tur).value;
        db.ref('kontroller/dozaj_' + tur + '_ml').set(parseInt(ml));
        document.getElementById('dozaj_mesaj').innerText = "⏳ Komut Köye Gönderildi...";
    }

    // GERÇEK DURUMU DİNLE (Geri Besleme)
    db.ref('durumlar').on('value', s => {
        const d = s.val();
        // Cam Gerçek Durum
        const c = document.getElementById('st_cam');
        c.innerText = d.gercek_cam == 0 ? "AÇIK" : "KAPALI";
        c.className = d.gercek_cam == 0 ? "status-tag tag-on" : "status-tag tag-off";
        
        // Fan Gerçek Durum
        const f = document.getElementById('st_fan');
        f.innerText = d.gercek_fan == 1 ? "ÇALIŞIYOR" : "OFF";
        f.className = d.gercek_fan == 1 ? "status-tag tag-on" : "status-tag tag-off";

        // Dozaj Onayı
        if(d.dozaj_onay !== "bekliyor") {
            document.getElementById('dozaj_mesaj').innerText = "✅ " + d.dozaj_onay.toUpperCase() + " İşlemi Başarılı!";
            setTimeout(() => { db.ref('durumlar/dozaj_onay').set("bekliyor"); }, 3000);
        }
    });

    // SENSÖRLERİ DİNLE
    db.ref('sensorler/canli').on('value', s => {
        const v = s.val();
        document.getElementById('v_is').innerText = v.ic_sicaklik + "°C";
        document.getElementById('v_in').innerText = "%" + v.ic_nem;
        document.getElementById('v_yg').innerText = v.yagmur == 1 ? "YAĞMUR VAR" : "YOK";
        document.getElementById('v_su').innerText = "%" + v.su_seviye;
    });
</script>
</body>
</html>
