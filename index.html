<div class="card">
    <div class="card-header"><span><i class="fas fa-vial"></i> DOZAJ POMPALARI</span></div>
    
    <div class="control-row" style="display: flex; flex-direction: column; gap: 8px;">
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <span>Gübre A Çözeltisi</span>
            <div style="display: flex; align-items: center; gap: 5px;">
                <input type="number" id="ml_a" value="10" style="width: 50px; background: #0d1117; color: white; border: 1px solid var(--border); border-radius: 4px; padding: 5px;">
                <span style="font-size: 0.8rem;">ml</span>
            </div>
        </div>
        <button id="btn_dozaj_a" class="btn btn-blue" onclick="dozajKomut('dozaj_a_ml', 'ml_a', 'btn_dozaj_a')">
            <div class="spinner"></div><span class="btn-text">GÖNDER</span>
        </button>
    </div>

    <div class="control-row" style="display: flex; flex-direction: column; gap: 8px;">
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <span>Gübre B Çözeltisi</span>
            <div style="display: flex; align-items: center; gap: 5px;">
                <input type="number" id="ml_b" value="10" style="width: 50px; background: #0d1117; color: white; border: 1px solid var(--border); border-radius: 4px; padding: 5px;">
                <span style="font-size: 0.8rem;">ml</span>
            </div>
        </div>
        <button id="btn_dozaj_b" class="btn btn-blue" onclick="dozajKomut('dozaj_b_ml', 'ml_b', 'btn_dozaj_b')">
            <div class="spinner"></div><span class="btn-text">GÖNDER</span>
        </button>
    </div>

    <div class="control-row" style="display: flex; flex-direction: column; gap: 8px;">
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <span>pH Düşürücü / Yükseltici</span>
            <div style="display: flex; align-items: center; gap: 5px;">
                <input type="number" id="ml_ph" value="5" style="width: 50px; background: #0d1117; color: white; border: 1px solid var(--border); border-radius: 4px; padding: 5px;">
                <span style="font-size: 0.8rem;">ml</span>
            </div>
        </div>
        <button id="btn_dozaj_ph" class="btn btn-blue" onclick="dozajKomut('dozaj_ph_ml', 'ml_ph', 'btn_dozaj_ph')">
            <div class="spinner"></div><span class="btn-text">GÖNDER</span>
        </button>
    </div>
</div>

<script>
    // Dozaj için özel fonksiyon (Miktarı inputtan okur)
    function dozajKomut(path, inputId, btnId) {
        const miktar = document.getElementById(inputId).value;
        const btn = document.getElementById(btnId);
        
        btn.classList.add('loading');
        btn.disabled = true;
        
        // Önce miktarı yaz, sonra onay beklemek için durumu 'bekliyor' yap
        db.ref('kontroller/' + path).set(parseInt(miktar));
        db.ref('durumlar/dozaj_onay').set("isleniyor");
    }

    // Handshake kısmına Dozaj Onay takibi ekle
    db.ref('durumlar/dozaj_onay').on('value', s => {
        if(s.val() === "Tamamlandi") {
            ['btn_dozaj_a', 'btn_dozaj_b', 'btn_dozaj_ph'].forEach(id => {
                document.getElementById(id).classList.remove('loading');
                document.getElementById(id).disabled = false;
            });
        }
    });
</script>
