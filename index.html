<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Sera Pro | Kontrol Paneli</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --accent: #58a6ff;
            --green: #238636; --red: #da3633; --text: #c9d1d9; --border: #30363d;
        }

        body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        
        header { grid-column: 1 / -1; text-align: center; padding: 20px; color: var(--accent); }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; font-weight: bold; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        .sensor-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .sensor-item { background: #0d1117; padding: 12px; border-radius: 10px; border: 1px solid #21262d; text-align: center; }
        .sensor-label { font-size: 0.7rem; opacity: 0.6; display: block; }
        .sensor-value { font-size: 1.1rem; font-weight: bold; }

        .control-row { background: #0d1117; padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #21262d; }
        .btn-group { display: flex; gap: 8px; margin-top: 8px; }
        
        .btn { flex: 1; padding: 10px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; position: relative; }
        .btn:disabled { opacity: 0.5; }
        .btn-green { background: var(--green); }
        .btn-red { background: var(--red); }
        .btn-blue { background: var(--accent); }

        .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid #fff; border-radius: 50%; animation: spin 1s linear infinite; display: none; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading .spinner { display: block; }
        .loading .btn-text { opacity: 0.7; }

        .status-tag { font-size: 0.7rem; padding: 3px 8px; border-radius: 5px; }
        .tag-on { background: rgba(56, 139, 253, 0.15); color: var(--accent); border: 1px solid var(--accent); }
        .tag-off { background: rgba(248, 81, 73, 0.15); color: #f85149; border: 1px solid #f85149; }

        input[type="number"] { width: 60px; background: #0b0e14; border: 1px solid var(--border); color: white; border-radius: 5px; padding: 5px; text-align: center; }

        /* GİRİŞ EKRANI STİLLERİ */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; align-items: center; justify-content: center;
            z-index: 1000; flex-direction: column;
        }
        .login-box {
            background: var(--card); padding: 30px; border-radius: 16px; border: 1px solid var(--border);
            text-align: center; width: 100%; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .login-box h2 { margin-top: 0; color: var(--accent); }
        .login-box input {
            width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px;
            border: 1px solid var(--border); background: #0b0e14; color: white;
            box-sizing: border-box; text-align: center; letter-spacing: 2px;
        }
        .login-box button { width: 100%; }
        .error-msg { color: var(--red); font-size: 0.85rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<!-- GİRİŞ EKRANI -->
<div id="login-overlay">
    <div class="login-box">
        <h2><i class="fas fa-lock"></i> GÜVENLİK</h2>
        <p style="font-size: 0.9rem; opacity: 0.7;">Sisteme erişmek için yetkilendirilmiş hesapla giriş yapın</p>
        <input type="email" id="login-email" placeholder="E-Posta Adresi">
        <input type="password" id="login-pwd" placeholder="••••••••" onkeypress="if(event.key === 'Enter') checkLogin()">
        <button class="btn btn-blue" onclick="checkLogin()">
            <span class="btn-text">GİRİŞ YAP</span>
        </button>
        <div id="login-error" class="error-msg">Giriş Başarısız!</div>
    </div>
</div>

<div id="app-content" style="display: none;">
<header>
    <h1><i class="fas fa-leaf"></i> SMART SERA PRO</h1>
    <p id="live-time">...</p>
    <div id="sys-status" class="status-tag tag-off" style="display: inline-block; margin-top:10px;">BAĞLANTI BEKLENİYOR...</div>
</header>

<div class="container">
    <div class="card">
        <div class="card-header"><span>İÇ ORTAM</span></div>
        <div class="sensor-group">
            <div class="sensor-item"><span class="sensor-label">SICAKLIK</span><span id="v_is" class="sensor-value">--</span></div>
            <div class="sensor-item"><span class="sensor-label">NEM</span><span id="v_in" class="sensor-value">--</span></div>
        </div>
        <div class="control-row" style="margin-top:15px;">
            <div style="display:flex; justify-content:space-between;">
                <span>Cam: <span id="st_cam" class="status-tag tag-off">...</span></span>
            </div>
            <div class="btn-group">
                <button id="btn_cam_ac" class="btn btn-green" onclick="runAction('CAM', 0, 'btn_cam_ac')">
                    <div class="spinner"></div><span class="btn-text">AÇ</span>
                </button>
                <button id="btn_cam_kapat" class="btn btn-red" onclick="runAction('CAM', 1, 'btn_cam_kapat')">
                    <div class="spinner"></div><span class="btn-text">KAPAT</span>
                </button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><span>DOZAJ SİSTEMİ</span></div>
        
        <div class="control-row">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <label>Gübre A:</label>
                <div><input type="number" id="val_a" value="10"> ml</div>
            </div>
            <button id="btn_a" class="btn btn-blue" style="width:100%; margin-top:8px;" onclick="runDozaj('DOZAJ_A', 'val_a', 'btn_a')">
                <div class="spinner"></div><span class="btn-text">GÖNDER</span>
            </button>
        </div>

        <div class="control-row">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <label>Gübre B:</label>
                <div><input type="number" id="val_b" value="10"> ml</div>
            </div>
            <button id="btn_b" class="btn btn-blue" style="width:100%; margin-top:8px;" onclick="runDozaj('DOZAJ_B', 'val_b', 'btn_b')">
                <div class="spinner"></div><span class="btn-text">GÖNDER</span>
            </button>
        </div>

        <div class="control-row">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <label>Gübre C:</label>
                <div><input type="number" id="val_c" value="10"> ml</div>
            </div>
            <button id="btn_c" class="btn btn-blue" style="width:100%; margin-top:8px;" onclick="runDozaj('DOZAJ_C', 'val_c', 'btn_c')">
                <div class="spinner"></div><span class="btn-text">GÖNDER</span>
            </button>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><span>SİSTEM ANALİZİ</span></div>
        <div class="sensor-group">
            <div class="sensor-item"><span class="sensor-label">SU pH</span><span id="v_ph" class="sensor-value">--</span></div>
            <div class="sensor-item"><span class="sensor-label">DEPO</span><span id="v_sd" class="sensor-value">--</span></div>
            <div class="sensor-item"><span class="sensor-label">DIŞ ISI</span><span id="v_ds" class="sensor-value">--</span></div>
            <div class="sensor-item"><span class="sensor-label">YAĞMUR</span><span id="v_yg" class="sensor-value">--</span></div>
        </div>
        <div class="control-row" style="margin-top:15px;">
            <span>Pompa: <span id="st_pompa" class="status-tag tag-off">...</span></span>
            <div class="btn-group">
                <button id="btn_p_ac" class="btn btn-green" onclick="runAction('POMPA', 1, 'btn_p_ac')">
                    <div class="spinner"></div><span class="btn-text">BAŞLAT</span>
                </button>
                <button id="btn_p_kap" class="btn btn-red" onclick="runAction('POMPA', 0, 'btn_p_kap')">
                    <div class="spinner"></div><span class="btn-text">DURDUR</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyClgXytcsJ0g9QV9JtsFawMirLMSPsheH4",
        authDomain: "mini-sera-otomasyonum.firebaseapp.com",
        databaseURL: "https://mini-sera-otomasyonum-default-rtdb.firebaseio.com",
        projectId: "mini-sera-otomasyonum",
        storageBucket: "mini-sera-otomasyonum.firebasestorage.app",
        messagingSenderId: "634824896479",
        appId: "1:634824896479:web:19718c648e18929257de6a",
        measurementId: "G-F9XP3956J9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    // FIREBASE AUTH MANTIĞI
    function checkLogin() {
        const email = document.getElementById('login-email').value;
        const pwd = document.getElementById('login-pwd').value;
        if (!email || !pwd) return;

        auth.signInWithEmailAndPassword(email, pwd)
            .then((userCredential) => {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                baslatUygulama();
            })
            .catch((error) => {
                const err = document.getElementById('login-error');
                err.innerText = "Hata: " + error.message;
                err.style.display = 'block';
                setTimeout(() => err.style.display = 'none', 5000);
            });
    }

    // Devlet Makinesi (State Machine) İşlem Gönderimi
    function gonderIslem(aktif_islem, islem_verisi, btnId) {
        document.getElementById(btnId).classList.add('loading');
        db.ref('sistem_durumu').update({
            aktif_islem: aktif_islem,
            islem_verisi: parseInt(islem_verisi),
            islem_durumu: "WAIT"
        });
    }

    function runAction(islem_adi, value, btnId) {
        gonderIslem(islem_adi, value, btnId);
    }

    function runDozaj(islem_adi, inputId, btnId) {
        let ml = document.getElementById(inputId).value;
        gonderIslem(islem_adi, ml, btnId);
    }

    // FIREBASE GERÇEK ZAMANLI DİNLEME (Sadece giriş yapıldıktan sonra çalışır)
    function baslatUygulama() {
        db.ref().on('value', s => {
            const data = s.val();
            if(!data) return;

        // 1. SENSÖR VERİLERİ (Eski UI Yerleşimi)
        try {
            document.getElementById('v_is').innerText = data.sensorler.canli.ic_ortam.sicaklik + "°C";
            document.getElementById('v_in').innerText = "%" + data.sensorler.canli.ic_ortam.nem;
            document.getElementById('v_ph').innerText = data.sensorler.canli.su_sistemleri.ph_degeri;
            document.getElementById('v_sd').innerText = "%" + data.sensorler.canli.su_sistemleri.depo_seviye_yuzde;
            document.getElementById('v_ds').innerText = data.sensorler.canli.dis_ortam.sicaklik + "°C";
            document.getElementById('v_yg').innerText = data.sensorler.canli.dis_ortam.yagmur_durumu == 1 ? "YAĞIYOR" : "YOK";
        } catch(e) {}

        // 2. CAM DURUMU
        const camDurum = data.durumlar ? data.durumlar.gercek_cam : 1;
        const stCam = document.getElementById('st_cam');
        stCam.innerText = camDurum == 0 ? "AÇIK" : "KAPALI";
        stCam.className = "status-tag " + (camDurum == 0 ? "tag-on" : "tag-off");

        // 3. POMPA DURUMU
        const pompaDurum = data.durumlar ? data.durumlar.gercek_pompa : 0;
        const stPompa = document.getElementById('st_pompa');
        stPompa.innerText = pompaDurum == 1 ? "ON" : "OFF";
        stPompa.className = "status-tag " + (pompaDurum == 1 ? "tag-on" : "tag-off");

        // 4. SİSTEM DURUMU, HEARTBEAT VE YÜKLENME (SPINNER) KONTROLLERİ
        if (data.sistem_durumu) {
            // Heartbeat: 30 saniyeden eskiyse offline
            const now = new Date().getTime();
            const lastSeen = data.sistem_durumu.son_gorulme || 0;
            const diff = now - lastSeen;
            const sysStatus = document.getElementById('sys-status');
            
            if (diff < 30000) {
                sysStatus.innerText = "SİSTEM ÇEVRİMİÇİ";
                sysStatus.className = "status-tag tag-on";
            } else {
                sysStatus.innerText = "SİSTEM ÇEVRİMDIŞI";
                sysStatus.className = "status-tag tag-off";
            }

            // State Machine: islem_durumu OK veya ERR ise butondaki spinner'ı kaldır
            if (data.sistem_durumu.islem_durumu === "OK" || data.sistem_durumu.islem_durumu === "ERR") {
                const aktif = data.sistem_durumu.aktif_islem;
                if (aktif === "CAM") { document.getElementById('btn_cam_ac').classList.remove('loading'); document.getElementById('btn_cam_kapat').classList.remove('loading'); }
                if (aktif === "POMPA") { document.getElementById('btn_p_ac').classList.remove('loading'); document.getElementById('btn_p_kap').classList.remove('loading'); }
                if (aktif === "DOZAJ_A") document.getElementById('btn_a').classList.remove('loading');
                if (aktif === "DOZAJ_B") document.getElementById('btn_b').classList.remove('loading');
                if (aktif === "DOZAJ_C") document.getElementById('btn_c').classList.remove('loading');
            }

            // Hata Kontrolü
            if (data.sistem_durumu.son_hata === "HATA:ILETISIM_KOPTU") {
                alert("SİSTEM HATASI: Arduino Mega ile iletişim kurulamadı!");
                db.ref('sistem_durumu/son_hata').set(""); 
            }
        }
    });
    }

    // Canlı Saat
    setInterval(() => { 
        document.getElementById('live-time').innerText = new Date().toLocaleString('tr-TR'); 
    }, 1000);
</script>
</body>
</html>
