<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Sera Pro | v6.1</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --green: #238636; --red: #da3633; --text: #c9d1d9; --border: #30363d; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 15px; }
        header { text-align: center; padding: 15px; background: #161b22; border-radius: 15px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); }
        .card-header { font-weight: bold; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }
        .sensor-item { background: #0d1117; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #21262d; margin-bottom: 5px; }
        .btn { width: 100%; border: none; border-radius: 10px; padding: 14px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; margin: 5px 0; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-blue { background: #1f6feb; } .btn-green { background: #238636; } .btn-red { background: #da3633; }
        .status-tag { float: right; font-size: 0.7rem; padding: 4px 8px; border-radius: 5px; }
        .tag-on { background: rgba(63,185,80,0.15); color: #3fb950; border: 1px solid #3fb950; }
        .tag-off { background: rgba(248,81,73,0.15); color: #f85149; border: 1px solid #f85149; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>🌿 SMART SERA PANELİ</h1><span id="live-time">...</span></header>
    <div class="dashboard-grid">
        <div class="card">
            <div class="card-header">CANLI VERİLER</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div class="sensor-item"><span>Isı</span><h3 id="v_is">--</h3></div>
                <div class="sensor-item"><span>Nem</span><h3 id="v_in">--</h3></div>
                <div class="sensor-item"><span>Yağmur</span><h3 id="v_yg">--</h3></div>
                <div class="sensor-item"><span>Depo</span><h3 id="v_sd">--</h3></div>
            </div>
        </div>
        <div class="card">
            <div class="card-header">SİSTEM KONTROLÜ</div>
            <div>Pencere: <span id="st_cam" class="status-tag tag-off">...</span></div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-green" onclick="control('cam_istek', 0, this)">AÇ</button>
                <button class="btn btn-red" onclick="control('cam_istek', 1, this)">KAPAT</button>
            </div>
            <div style="margin-top:15px;">Fan: <span id="st_fan" class="status-tag tag-off">...</span></div>
            <button class="btn btn-blue" onclick="toggle('fan_istek', this)">FAN AÇ/KAPAT</button>
            <div style="margin-top:15px;">Pompa: <span id="st_pompa" class="status-tag tag-off">...</span></div>
            <button class="btn btn-blue" onclick="toggle('pompa_istek', this)">POMPA AÇ/KAPAT</button>
        </div>
    </div>
</div>

<script>
    const config = { databaseURL: "https://mini-sera-otomasyonum-default-rtdb.firebaseio.com" };
    firebase.initializeApp(config);
    const db = firebase.database();

    function control(path, val, btn) {
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> İşleniyor...';
        db.ref('kontroller/' + path).set(val);
    }

    function toggle(path, btn) {
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Bekleniyor...';
        db.ref('kontroller/' + path).once('value', s => {
            db.ref('kontroller/' + path).set(s.val() == 1 ? 0 : 1);
        });
    }

    // GERÇEK DURUM VE SENSÖR DİNLEME
    db.ref().on('value', s => {
        const data = s.val();
        // Sensörler
        const v = data.sensorler.canli;
        document.getElementById('v_is').innerText = v.ic_ortam.sicaklik + "°C";
        document.getElementById('v_in').innerText = "%" + v.ic_ortam.nem;
        document.getElementById('v_yg').innerText = v.dis_ortam.yagmur_durumu == 1 ? "VAR" : "YOK";
        document.getElementById('v_sd').innerText = "%" + v.su_sistemleri.depo_seviye_yuzde;

        // Durumlar ve Buton Kilidi Açma
        const d = data.durumlar;
        updateUI('st_cam', d.gercek_cam, ["AÇIK", "KAPALI"]);
        updateUI('st_fan', d.gercek_fan, ["OFF", "ON"]);
        updateUI('st_pompa', d.gercek_pompa, ["OFF", "ON"]);

        // Onay geldiğinde tüm buton kilitlerini aç
        document.querySelectorAll('.btn').forEach(b => {
            if(b.innerHTML.includes("spin")) {
                setTimeout(() => { b.disabled = false; b.innerHTML = b.innerText; }, 500);
            }
        });
    });

    function updateUI(id, val, labels) {
        const el = document.getElementById(id);
        el.innerText = (val == 0 || val == "OFF") ? labels[0] : labels[1];
        el.className = (val == 0 || val == "OFF") ? "status-tag tag-on" : "status-tag tag-off";
    }

    setInterval(() => { document.getElementById('live-time').innerText = new Date().toLocaleString(); }, 1000);
</script>
</body>
</html>
