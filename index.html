<div class="card">
    <h1>🌿 Sera Kontrol Merkezi</h1>
    
    <div class="status-box">
        <div id="durum">Bağlanıyor...</div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
        <div class="status-box" style="margin:0">🌡️ <span id="val_sicaklik">--</span>°C</div>
        <div class="status-box" style="margin:0">💧 %<span id="val_nem">--</span></div>
        <div class="status-box" style="margin:0">🧪 pH: <span id="val_ph">--</span></div>
        <div class="status-box" style="margin:0">🌱 Toprak: %<span id="val_tnem">--</span></div>
    </div>

    <div class="btn-group">
        <button class="btn-open" onclick="gonder(0)">CAMI AÇ</button>
        <button class="btn-close" onclick="gonder(1)">CAMI KAPAT</button>
    </div>
</div>

<script>
    // Firebase referanslarını yeni yapıya göre güncelle
    db.ref('sensorler/sicaklik').on('value', s => document.getElementById('val_sicaklik').innerText = s.val());
    db.ref('sensorler/nem').on('value', s => document.getElementById('val_nem').innerText = s.val());
    db.ref('sensorler/ph_degeri').on('value', s => document.getElementById('val_ph').innerText = s.val());
    db.ref('kontroller/cam_durum').on('value', s => {
        // Buton ve yazı güncellemeleri buraya...
    });
</script>
