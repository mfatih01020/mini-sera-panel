<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Smart Sera Pro | Kontrol Merkezi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --accent: #58a6ff;
            --green: #238636;
            --red: #da3633;
            --text: #c9d1d9;
            --border: #30363d;
        }

        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; max-width: 400px; margin: auto; }
        
        /* Buton ve Yükleme Animasyonu Tasarımı */
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:disabled {
            background: #30363d !important;
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Yükleme Dairesi (Spinner) Animasyonu */
        .spinner {
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none; /* Varsayılan olarak gizli */
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading .spinner { display: block; }
        .loading .btn-text { display: none; }

        .btn-green { background: var(--green); }
        .btn-red { background: var(--red); }
        
        .status-tag { padding: 5px 10px; border-radius: 6px; font-size: 0.8rem; float: right; }
        .tag-on { background: rgba(63, 185, 80, 0.1); color: #3fb950; border: 1px solid #3fb950; }
        .tag-off { background: rgba(248, 81, 73, 0.1); color: #f85149; border: 1px solid #f85149; }
    </style>
</head>
<body>

<div class="card">
    <h3><i class="fas fa- wind"></i> Sistem Kontrolü</h3>
    
    <div style="margin-bottom: 20px;">
        <span>Pencere:</span> <span id="st_cam" class="status-tag tag-off">KAPALI</span>
        <button id="btn_cam_ac" class="btn btn-green" onclick="komutGonder('cam_istek', 0, 'btn_cam_ac')">
            <div class="spinner"></div>
            <span class="btn-text">CAMI AÇ</span>
        </button>
        <button id="btn_cam_kapat" class="btn btn-red" onclick="komutGonder('cam_istek', 1, 'btn_cam_kapat')">
            <div class="spinner"></div>
            <span class="btn-text">CAMI KAPAT</span>
        </button>
    </div>

    <hr style="border-color: var(--border);">

    <div>
        <span>Pompa:</span> <span id="st_pompa" class="status-tag tag-off">OFF</span>
        <button id="btn_pompa_ac" class="btn btn-green" onclick="komutGonder('pompa_istek', 1, 'btn_pompa_ac')">
            <div class="spinner"></div>
            <span class="btn-text">POMPAYI ÇALIŞTIR</span>
        </button>
        <button id="btn_pompa_kapat" class="btn btn-red" onclick="komutGonder('pompa_istek', 0, 'btn_pompa_kapat')">
            <div class="spinner"></div>
            <span class="btn-text">POMPAYI DURDUR</span>
        </button>
    </div>
</div>

<script>
    // Firebase Yapılandırması
    const firebaseConfig = { databaseURL: "https://mini-sera-otomasyonum-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Komut Gönderme ve Loading Başlatma
    function komutGonder(path, val, btnId) {
        const btn = document.getElementById(btnId);
        btn.classList.add('loading'); // Spinner'ı göster
        btn.disabled = true; // Tekrar basılmasını engelle
        
        db.ref('kontroller/' + path).set(val); // Firebase'e yaz
    }

    // Durumları Dinle ve Loading Durumunu Bitir (Handshake)
    db.ref('durumlar').on('value', s => {
        const d = s.val();
        if(!d) return;

        // Cam Geri Bildirimi
        const camEtiket = document.getElementById('st_cam');
        if(d.gercek_cam == 0) {
            camEtiket.innerText = "AÇIK"; camEtiket.className = "status-tag tag-on";
            btnYuklemeyiBitir('btn_cam_ac');
        } else {
            camEtiket.innerText = "KAPALI"; camEtiket.className = "status-tag tag-off";
            btnYuklemeyiBitir('btn_cam_kapat');
        }

        // Pompa Geri Bildirimi
        const pompaEtiket = document.getElementById('st_pompa');
        if(d.gercek_pompa == 1) {
            pompaEtiket.innerText = "ON"; pompaEtiket.className = "status-tag tag-on";
            btnYuklemeyiBitir('btn_pompa_ac');
        } else {
            pompaEtiket.innerText = "OFF"; pompaEtiket.className = "status-tag tag-off";
            btnYuklemeyiBitir('btn_pompa_kapat');
        }
    });

    function btnYuklemeyiBitir(btnId) {
        const btn = document.getElementById(btnId);
        btn.classList.remove('loading');
        btn.disabled = false;
        
        // Karşı butonu da temizle (Örn: Açıldıysa Kapat butonu da aktif kalmalı)
        if(btnId.includes('cam')) {
            document.getElementById('btn_cam_ac').classList.remove('loading');
            document.getElementById('btn_cam_ac').disabled = false;
            document.getElementById('btn_cam_kapat').classList.remove('loading');
            document.getElementById('btn_cam_kapat').disabled = false;
        }
        if(btnId.includes('pompa')) {
            document.getElementById('btn_pompa_ac').classList.remove('loading');
            document.getElementById('btn_pompa_ac').disabled = false;
            document.getElementById('btn_pompa_kapat').classList.remove('loading');
            document.getElementById('btn_pompa_kapat').disabled = false;
        }
    }
</script>

</body>
</html>
